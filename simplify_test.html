<!DOCTYPE html>
<html>
<body>
<h2>Simple Moth Test</h2>
<div id="status">Ready</div>
<button onclick="startTest()">Start</button>
<script>
function startTest() {
  let gen = 0;
  const interval = setInterval(() => {
    gen++;
    document.getElementById('status').textContent = `Generation: ${gen}`;
    if (gen >= 10) clearInterval(interval);
  }, 500);
}
</script>
</body>
</html>
